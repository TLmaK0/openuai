name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o openuai .
